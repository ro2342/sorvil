<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="100%" height="100%">
  <!--
    Ícone Sorvil — leitor de ebooks conectado ao Calibre-Web
    Estilo: Microsoft Design Language 2 (MDL2 / W10M Metro)
    Target: Windows 10 Mobile (Lumia, Live Tile)
    Cor: Branco puro (#FFFFFF) com fundo 100% transparente
  -->
  <g fill="#FFFFFF" fill-rule="evenodd">

    <!-- 1. Prateleira: lombadas de livros em pé -->
    <rect x="16" y="18" width="8" height="20" rx="1.5" />
    <rect x="29" y="10" width="9" height="28" rx="1.5" />
    <rect x="43" y="16" width="8" height="22" rx="1.5" />
    <rect x="56" y="12" width="9" height="26" rx="1.5" />
    <rect x="70" y="19" width="8" height="19" rx="1.5" />

    <!-- Tábua da prateleira -->
    <rect x="14" y="38" width="66" height="3.5" rx="1.5" />

    <!-- 2. Livro aberto embaixo, apoiado na prateleira -->
    <path d="M 14 52 Q 32 44 46 50 L 46 86 Q 32 92 14 84 Z" />
    <path d="M 50 50 Q 64 44 82 52 L 82 84 Q 64 92 50 86 Z" />

  </g>
</svg>
